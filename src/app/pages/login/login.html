<div class="min-h-screen bg-bg flex items-center justify-center px-4 py-12">
  <!-- Background accents -->
  <div class="fixed top-0 left-0 w-full h-full pointer-events-none">
    <div class="absolute top-1/3 left-1/4 w-72 h-72 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/3 right-1/4 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-block text-3xl font-extrabold tracking-tight">
        <span class="text-primary">Read</span><span class="text-text">Now</span>
      </a>
      <p class="text-text-secondary mt-2 text-sm">Inicia sesión en tu cuenta</p>
    </div>

    <!-- Card -->
    <div class="bg-surface border border-border rounded-2xl p-8">
      <!-- Info / error -->
      @if (info()) {
        <div class="bg-success/10 border border-success/30 rounded-lg px-4 py-3 mb-6">
          <p class="text-success text-sm">{{ info() }}</p>
        </div>
      }
      @if (error()) {
        <div class="bg-danger/10 border border-danger/30 rounded-lg px-4 py-3 mb-6">
          <p class="text-danger text-sm">{{ error() }}</p>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <!-- Email -->
        <div class="mb-5">
          <label for="email" class="block text-text-secondary text-sm mb-1.5">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            required
            email
            placeholder="tu@correo.com"
            class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="text-text-secondary text-sm">Contraseña</label>
            <a routerLink="/recuperar-password" class="text-primary hover:text-primary-hover text-xs font-medium transition-colors">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            minlength="6"
            placeholder="••••••••"
            class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loginForm.invalid || loading()"
          class="w-full bg-primary hover:bg-primary-hover disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg px-6 py-3 font-semibold text-sm transition-all duration-200 hover:shadow-lg hover:shadow-primary/25 flex items-center justify-center gap-2"
        >
          @if (loading()) {
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Iniciando sesión...
          } @else {
            Iniciar sesión
          }
        </button>
      </form>
    </div>

    <!-- Register link -->
    <p class="text-center text-text-secondary text-sm mt-6">
      ¿No tienes cuenta?
      <a routerLink="/registro" class="text-primary hover:text-primary-hover font-medium transition-colors">
        Regístrate
      </a>
    </p>
  </div>
</div>
