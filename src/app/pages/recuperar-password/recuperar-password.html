<div class="min-h-screen bg-bg flex items-center justify-center px-4 py-12">
  <!-- Background accents -->
  <div class="fixed top-0 left-0 w-full h-full pointer-events-none">
    <div class="absolute top-1/3 left-1/3 w-72 h-72 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/3 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-block text-3xl font-extrabold tracking-tight">
        <span class="text-primary">Read</span><span class="text-text">Now</span>
      </a>
    </div>

    <!-- Card -->
    <div class="bg-surface border border-border rounded-2xl p-8">
      <!-- Icon -->
      <div class="flex justify-center mb-6">
        <div class="w-16 h-16 bg-secondary/10 rounded-2xl flex items-center justify-center">
          <svg class="w-8 h-8 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
        </div>
      </div>

      <h2 class="text-text text-xl font-bold text-center mb-2">Recuperar contraseña</h2>
      <p class="text-text-secondary text-sm text-center mb-6">
        Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
      </p>

      <!-- Error message -->
      @if (error()) {
        <div class="bg-danger/10 border border-danger/30 rounded-lg px-4 py-3 mb-6">
          <p class="text-danger text-sm">{{ error() }}</p>
        </div>
      }

      <!-- Success message -->
      @if (success()) {
        <div class="bg-success/10 border border-success/30 rounded-lg px-4 py-3 mb-6">
          <div class="flex items-start gap-3">
            <svg class="w-5 h-5 text-success shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-success text-sm">{{ success() }}</p>
          </div>
        </div>
      }

      @if (!success()) {
        <form (ngSubmit)="onSubmit()" #recForm="ngForm">
          <!-- Email -->
          <div class="mb-6">
            <label for="email" class="block text-text-secondary text-sm mb-1.5">Correo electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="email"
              required
              email
              placeholder="tu@correo.com"
              class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            />
          </div>

          <!-- Submit -->
          <button
            type="submit"
            [disabled]="recForm.invalid || loading()"
            class="w-full bg-primary hover:bg-primary-hover disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg px-6 py-3 font-semibold text-sm transition-all duration-200 hover:shadow-lg hover:shadow-primary/25 flex items-center justify-center gap-2"
          >
            @if (loading()) {
              <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              Enviando...
            } @else {
              Enviar enlace de recuperación
            }
          </button>
        </form>
      }
    </div>

    <!-- Back to login -->
    <p class="text-center text-text-secondary text-sm mt-6">
      <a routerLink="/login" class="text-text-secondary hover:text-text transition-colors">
        ← Volver al inicio de sesión
      </a>
    </p>
  </div>
</div>
