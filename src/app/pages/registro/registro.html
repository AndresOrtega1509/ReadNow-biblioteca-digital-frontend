<div class="min-h-screen bg-bg flex items-center justify-center px-4 py-12">
  <!-- Background accents -->
  <div class="fixed top-0 left-0 w-full h-full pointer-events-none">
    <div class="absolute top-1/4 right-1/4 w-72 h-72 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 left-1/3 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10 w-full max-w-lg">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-block text-3xl font-extrabold tracking-tight">
        <span class="text-primary">Read</span><span class="text-text">Now</span>
      </a>
      <p class="text-text-secondary mt-2 text-sm">Crea tu cuenta y comienza a leer</p>
    </div>

    <!-- Card -->
    <div class="bg-surface border border-border rounded-2xl p-8">
      <!-- Error message -->
      @if (error()) {
        <div class="bg-danger/10 border border-danger/30 rounded-lg px-4 py-3 mb-6">
          <p class="text-danger text-sm">{{ error() }}</p>
        </div>
      }

      <!-- Success message -->
      @if (success()) {
        <div class="bg-success/10 border border-success/30 rounded-lg px-4 py-3 mb-6">
          <p class="text-success text-sm">{{ success() }}</p>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #registroForm="ngForm">
        <!-- Nombre & Apellido row -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
          <div>
            <label for="nombre" class="block text-text-secondary text-sm mb-1.5">Nombre</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              [(ngModel)]="nombre"
              required
              placeholder="Juan"
              class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            />
          </div>
          <div>
            <label for="apellido" class="block text-text-secondary text-sm mb-1.5">Apellido</label>
            <input
              type="text"
              id="apellido"
              name="apellido"
              [(ngModel)]="apellido"
              required
              placeholder="Pérez"
              class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="mb-5">
          <label for="email" class="block text-text-secondary text-sm mb-1.5">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            required
            email
            placeholder="tu@correo.com"
            class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          />
        </div>

        <!-- Teléfono & Username row -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
          <div>
            <label for="telefono" class="block text-text-secondary text-sm mb-1.5">Teléfono</label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              [(ngModel)]="telefono"
              required
              placeholder="+57 300 123 4567"
              class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            />
          </div>
          <div>
            <label for="username" class="block text-text-secondary text-sm mb-1.5">Usuario</label>
            <input
              type="text"
              id="username"
              name="username"
              [(ngModel)]="username"
              required
              placeholder="juanperez"
              class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label for="password" class="block text-text-secondary text-sm mb-1.5">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            minlength="6"
            placeholder="Mínimo 6 caracteres"
            class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          />
        </div>

        <!-- Confirmar Password -->
        <div class="mb-6">
          <label for="confirmarPassword" class="block text-text-secondary text-sm mb-1.5">Confirmar contraseña</label>
          <input
            type="password"
            id="confirmarPassword"
            name="confirmarPassword"
            [(ngModel)]="confirmarPassword"
            required
            placeholder="Repite tu contraseña"
            class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-3 text-sm placeholder-text-secondary/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
            [class.border-danger]="passwordsMismatch"
            [class.focus:ring-danger]="passwordsMismatch"
          />
          @if (passwordsMismatch) {
            <p class="text-danger text-xs mt-1.5">Las contraseñas no coinciden</p>
          }
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="registroForm.invalid || loading() || passwordsMismatch"
          class="w-full bg-primary hover:bg-primary-hover disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg px-6 py-3 font-semibold text-sm transition-all duration-200 hover:shadow-lg hover:shadow-primary/25 flex items-center justify-center gap-2"
        >
          @if (loading()) {
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Creando cuenta...
          } @else {
            Registrarse
          }
        </button>
      </form>
    </div>

    <!-- Login link -->
    <p class="text-center text-text-secondary text-sm mt-6">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-primary hover:text-primary-hover font-medium transition-colors">
        Inicia sesión
      </a>
    </p>
  </div>
</div>
