<div class="min-h-screen bg-bg flex items-center justify-center px-4 py-12">
  <!-- Background accents -->
  <div class="fixed top-0 left-0 w-full h-full pointer-events-none">
    <div class="absolute top-1/3 right-1/3 w-72 h-72 bg-secondary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/3 left-1/4 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-block text-3xl font-extrabold tracking-tight">
        <span class="text-primary">Read</span><span class="text-text">Now</span>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-surface border border-border rounded-2xl p-8">
      <!-- Icon -->
      <div class="flex justify-center mb-6">
        <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center">
          <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
      </div>

      <h2 class="text-text text-xl font-bold text-center mb-2">Verificación de código</h2>
      <p class="text-text-secondary text-sm text-center mb-2">
        Ingresa el código de verificación enviado a
      </p>
      <p class="text-primary text-sm font-medium text-center mb-6">{{ email }}</p>

      <!-- Timer -->
      <div class="flex justify-center mb-6">
        <div class="inline-flex items-center gap-2 bg-surface-light border border-border rounded-full px-4 py-2">
          <svg class="w-4 h-4 text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="text-sm font-mono" [class.text-text-secondary]="!timerExpired" [class.text-danger]="timerExpired">
            @if (timerExpired) {
              Código expirado
            } @else {
              {{ timerDisplay }}
            }
          </span>
        </div>
      </div>

      <!-- Error message -->
      @if (error()) {
        <div class="bg-danger/10 border border-danger/30 rounded-lg px-4 py-3 mb-6">
          <p class="text-danger text-sm">{{ error() }}</p>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #verForm="ngForm">
        <!-- Code input -->
        <div class="mb-6">
          <label for="codigo" class="block text-text-secondary text-sm mb-1.5">Código de verificación</label>
          <input
            type="text"
            id="codigo"
            name="codigo"
            [(ngModel)]="codigo"
            required
            maxlength="6"
            placeholder="000000"
            autocomplete="one-time-code"
            class="w-full bg-surface-light border border-border text-text rounded-lg px-4 py-4 text-center text-2xl font-mono tracking-[0.5em] placeholder-text-secondary/30 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="verForm.invalid || loading() || timerExpired"
          class="w-full bg-primary hover:bg-primary-hover disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg px-6 py-3 font-semibold text-sm transition-all duration-200 hover:shadow-lg hover:shadow-primary/25 flex items-center justify-center gap-2"
        >
          @if (loading()) {
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Verificando...
          } @else {
            Verificar
          }
        </button>
      </form>

      <!-- Resend -->
      <div class="text-center mt-6">
        <button
          type="button"
          (click)="resendCode()"
          [disabled]="resending()"
          class="text-primary hover:text-primary-hover text-sm font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (resending()) {
            Reenviando...
          } @else {
            Reenviar código
          }
        </button>
      </div>
    </div>

    <!-- Back to login -->
    <div class="text-center mt-6">
      <a routerLink="/login" class="inline-flex items-center gap-2 text-text-secondary hover:text-text transition-colors text-sm font-medium">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Volver al inicio de sesión
      </a>
    </div>
  </div>
</div>
