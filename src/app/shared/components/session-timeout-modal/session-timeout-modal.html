@if (sessionService.showTimeoutModal()) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-[100] flex items-center justify-center">
    <div class="absolute inset-0 bg-bg/80 backdrop-blur-sm"></div>

    <!-- Modal -->
    <div class="relative z-10 w-full max-w-sm mx-4 bg-surface border border-border rounded-2xl shadow-2xl p-8 text-center animate-in zoom-in-95 fade-in duration-200">

      <!-- Warning icon -->
      <div class="mx-auto w-16 h-16 rounded-full bg-danger/10 border-2 border-danger/30 flex items-center justify-center mb-5">
        <svg class="w-8 h-8 text-danger" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
        </svg>
      </div>

      <!-- Title -->
      <h2 class="text-lg font-bold text-text mb-2">Sesión por expirar</h2>
      <p class="text-sm text-text-secondary mb-6">
        Tu sesión se cerrará por inactividad. ¿Deseas continuar?
      </p>

      <!-- Countdown -->
      <div class="relative mx-auto w-24 h-24 mb-6">
        <!-- Circle background -->
        <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke-width="6"
                  class="stroke-border"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke-width="6"
                  stroke-linecap="round"
                  class="stroke-danger transition-all duration-1000 ease-linear"
                  [style.stroke-dasharray]="2 * 3.14159 * 42"
                  [style.stroke-dashoffset]="2 * 3.14159 * 42 * (1 - sessionService.countdownSeconds() / 60)"/>
        </svg>
        <!-- Number -->
        <div class="absolute inset-0 flex items-center justify-center">
          <span class="text-3xl font-bold tabular-nums"
                [class]="sessionService.countdownSeconds() <= 10 ? 'text-danger' : 'text-text'">
            {{ sessionService.countdownSeconds() }}
          </span>
        </div>
      </div>

      <p class="text-xs text-text-secondary mb-6">segundos restantes</p>

      <!-- Button -->
      <button
        (click)="confirm()"
        class="w-full py-3 px-6 bg-primary hover:bg-primary-hover text-text font-semibold text-sm rounded-xl transition-colors duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary/50">
        Continuar sesión
      </button>
    </div>
  </div>
}
