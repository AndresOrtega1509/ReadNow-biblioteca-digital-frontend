<div class="inline-flex items-center gap-0.5" (mouseleave)="onLeave()">
  @for (star of stars; track star) {
    <button
      type="button"
      (mouseenter)="onHover(star)"
      (click)="onClick(star)"
      [class]="readonly() ? 'cursor-default' : 'cursor-pointer'"
      class="p-0.5 transition-transform duration-150 hover:scale-110 focus:outline-none disabled:cursor-default"
      [disabled]="readonly()">
      <svg
        class="w-6 h-6 transition-colors duration-150"
        [class]="isActive(star) ? 'text-accent drop-shadow-[0_0_4px_rgba(255,211,42,0.4)]' : 'text-border'"
        viewBox="0 0 20 20"
        fill="currentColor">
        <path
          fill-rule="evenodd"
          d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401z"
          clip-rule="evenodd"/>
      </svg>
    </button>
  }
</div>
